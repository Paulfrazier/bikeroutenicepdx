name: BikeRouteNicePDX
options:
  bundleIdPrefix: website.fairpoint
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1

targets:
  BikeRouteNicePDX:
    type: application
    platform: iOS
    sources:
      - path: BikeRouteNicePDX
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: BikeRouteNicePDX/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: website.fairpoint.bikeroutenicepdx
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: DFG7YZ82LP
    info:
      path: BikeRouteNicePDX/Info.plist
      properties:
        CFBundleDisplayName: BikeRoute PDX
        CFBundleName: BikeRouteNicePDX
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        # Base URL for the snapping/search server. Production = Railway (HTTPS,
        # works anywhere). For local dev against `npm run dev:server`, point this
        # at your Mac's LAN IP and add an http exception under NSExceptionDomains.
        APIBaseURL: "https://bikeroutenicepdx-production.up.railway.app"
        NSLocationWhenInUseUsageDescription: "Shows your location on the map so you can draw routes from where you are."
        NSAppTransportSecurity:
          NSExceptionDomains:
            localhost:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
        UILaunchScreen:
          UIColorName: "LaunchBrand"
          UIImageName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
