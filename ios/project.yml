name: BikeRouteNicePDX
options:
  bundleIdPrefix: website.fairpoint
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1

targets:
  BikeRouteNicePDX:
    type: application
    platform: iOS
    sources:
      - path: BikeRouteNicePDX
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: BikeRouteNicePDX/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: website.fairpoint.bikeroutenicepdx
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
    info:
      path: BikeRouteNicePDX/Info.plist
      properties:
        CFBundleDisplayName: BikeRoute PDX
        CFBundleName: BikeRouteNicePDX
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        # Base URL for the snapping/search server. Default works from the
        # simulator (shares the host's network). For a physical device, set
        # this to your Mac's LAN IP and add it to NSExceptionDomains below.
        APIBaseURL: "http://localhost:3000"
        NSLocationWhenInUseUsageDescription: "Shows your location on the map so you can draw routes from where you are."
        NSAppTransportSecurity:
          NSExceptionDomains:
            localhost:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
        UILaunchScreen:
          UIColorName: "LaunchBrand"
          UIImageName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
