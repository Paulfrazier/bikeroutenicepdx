name: BikeRouteNicePDX
options:
  bundleIdPrefix: website.fairpoint
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 4

targets:
  BikeRouteNicePDX:
    type: application
    platform: iOS
    sources:
      - path: BikeRouteNicePDX
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: BikeNavWidget
        embed: true
      # BikeNiceWatch is built on its own watchOS scheme (not embedded here) so the
      # iOS app build never drags WatchKit onto the iOS SDK. Embed it for pairing as
      # a follow-up once a watchOS run destination is wired into CI/local signing.
    settings:
      base:
        INFOPLIST_FILE: BikeRouteNicePDX/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: website.fairpoint.bikeroutenicepdx
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: DFG7YZ82LP
    info:
      path: BikeRouteNicePDX/Info.plist
      properties:
        CFBundleDisplayName: BikeRoute PDX
        CFBundleName: BikeRouteNicePDX
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        ITSAppUsesNonExemptEncryption: false
        # Base URL for the snapping/search server. Production = Railway (HTTPS,
        # works anywhere). For local dev against `npm run dev:server`, point this
        # at your Mac's LAN IP and add an http exception under NSExceptionDomains.
        APIBaseURL: "https://bikeroutenicepdx-production.up.railway.app"
        NSLocationWhenInUseUsageDescription: "Shows your location on the map and powers turn-by-turn navigation along your route."
        NSLocationAlwaysAndWhenInUseUsageDescription: "Keeps turn-by-turn guidance running while the app is in the background or your screen is locked during a ride."
        UIBackgroundModes:
          - location
          - audio
        NSSupportsLiveActivities: true
        NSAppTransportSecurity:
          NSExceptionDomains:
            localhost:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
        UILaunchScreen:
          UIColorName: "LaunchBrand"
          UIImageName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}

  BikeNavWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: BikeNavWidget
      # Shared with the app target so both compile the same models.
      - path: BikeRouteNicePDX/Services/NavActivityAttributes.swift
      - path: BikeRouteNicePDX/Views/ManeuverStyle.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: website.fairpoint.bikeroutenicepdx.BikeNavWidget
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: DFG7YZ82LP
    info:
      path: BikeNavWidget/Info.plist
      properties:
        CFBundleDisplayName: BikeNav
        # Embedded extension — version/build MUST match the host app or App Store
        # Connect rejects the upload. Track the shared build settings.
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  BikeNiceWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: BikeNiceWatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: website.fairpoint.bikeroutenicepdx.watchkitapp
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: DFG7YZ82LP
    info:
      path: BikeNiceWatch/Info.plist
      properties:
        CFBundleDisplayName: BikeRoute
        WKApplication: true
        WKCompanionAppBundleIdentifier: website.fairpoint.bikeroutenicepdx
