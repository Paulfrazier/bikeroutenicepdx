# BikeRouteNicePDX — Valhalla routing service (local validation)
#
# Greenway preference is baked into portland-tagged.osm.pbf as standard OSM tags
# (cycleway/bicycle/lcn) by scripts/build-graph.ts, so this runs STOCK Valhalla
# with its default Lua — no custom tag transform.
#
# Image: gis-ops / nilsnolde docker-valhalla. It scans /custom_files for a .pbf,
# builds routing tiles there on first run (or when force_rebuild=True), and
# serves on :8002. The server sends costing_options (use_roads etc.) per request,
# so no custom valhalla.json is needed here.
#
# Usage:
#   ../scripts/stage-valhalla.sh   # copies the tagged PBF into ./custom_files
#   docker compose up --build      # first run builds tiles (~minutes)
# Force a clean rebuild after the PBF changes:
#   set force_rebuild=True (below) or `rm -rf custom_files/*tile*` then up.

services:
  valhalla:
    image: ghcr.io/nilsnolde/docker-valhalla/valhalla:latest
    container_name: bikeroutenice-valhalla

    ports:
      - "8002:8002"

    volumes:
      # Holds the .pbf and the built tiles. Populate with the tagged PBF first.
      - ./custom_files:/custom_files

    environment:
      - force_rebuild=False        # build only if tiles are absent
      - use_tiles_ignore_pbf=False
      - build_elevation=False      # no SRTM download; use_hills has no effect
      - build_admins=False         # skip admin DB (no country/state crossing logic)
      - build_time_zones=False
      - serve_tiles=True

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8002/status"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 300s  # first tile build can take several minutes

    restart: unless-stopped
